# Render Blueprint - Network Congestion Detection Platform
# Free tier deployment
# Note: PostgreSQL database was created separately (Render Free Tier doesn't support `postgres` type in blueprints)
# The DATABASE_URL below points to the already-created database.

services:
  # ========== Backend API (Flask) - Free Web Service ==========
  # Serves BOTH the API (Flask) AND the React frontend (built into the Docker image)
  - type: web
    name: congestion-backend
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/system/health
    autoDeploy: true
    envVars:
      - key: FLASK_ENV
        value: production
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      # Using the external Render PostgreSQL URL (already created manually)
      - key: DATABASE_URL
        value: postgresql://congestion_admin:LIyummCAY8Q2j3K7QkDsm90ILu4m3hGp@dpg-d98h9jmtrd3s73em56b0-a.oregon-postgres.render.com/congestion_db
      - key: CACHE_TYPE
        value: SimpleCache
      - key: RATELIMIT_STORAGE_URI
        value: memory://
      - key: CORS_ORIGINS
        value: "*"
      - key: LOG_LEVEL
        value: INFO
      - key: PORT
        value: "5000"
      - key: PYTHON_VERSION
        value: "3.11.9"
