<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="net" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Network nodes -->
  <circle cx="20" cy="20" r="4" fill="url(#net)"/>
  <circle cx="44" cy="20" r="4" fill="url(#net)"/>
  <circle cx="32" cy="44" r="4" fill="url(#net)"/>
  <circle cx="32" cy="32" r="6" fill="#ffffff" opacity="0.95"/>
  <!-- Connection lines -->
  <line x1="20" y1="20" x2="32" y2="32" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
  <line x1="44" y1="20" x2="32" y2="32" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
  <line x1="32" y1="44" x2="32" y2="32" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
  <line x1="20" y1="20" x2="44" y2="20" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  <!-- Pulse rings -->
  <circle cx="32" cy="32" r="10" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.5"/>
  <circle cx="32" cy="32" r="14" stroke="#ffffff" stroke-width="0.5" fill="none" opacity="0.3"/>
</svg>
