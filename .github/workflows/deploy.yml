name: Deploy to Render

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        if: ${{ secrets.RENDER_DEPLOY_HOOK != '' }}
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
        continue-on-error: true

      - name: Deployment Info
        run: |
          echo "============================================"
          echo "  Network Congestion Platform"
          echo "============================================"
          echo ""
          echo "Repository: ${{ github.repositoryUrl }}"
          echo "Commit: ${{ github.sha }}"
          echo ""
          echo "To enable auto-deploy to Render:"
          echo "1. Go to https://render.com and create a Blueprint from this repo"
          echo "2. Or set RENDER_DEPLOY_HOOK secret in repo settings"
          echo ""
          echo "Manual deploy URL:"
          echo "https://render.com/deploy?repo=https://github.com/alsrwryasamh5-sudo/network-congestion-platform"
